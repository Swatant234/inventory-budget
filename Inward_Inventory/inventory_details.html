<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eConnect | Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../common.css">
    <link rel="stylesheet" href="../styles.css">

</head>

<body>

    <div id="sidebar-placeholder"></div>
    <div id="header-placeholder"></div>

    <main id="main-wrapper">
        <div class="sticky-header px-3 py-2 mb-3">
            <div class="d-flex justify-content-between align-items-center">
                <div>
                    <nav class="breadcrumb mb-0">
                        <h5 class="fw-bold mb-0">Inventory Inward Details</h5>
                    </nav>
                </div>
                <div class="d-flex gap-3">
                    <button class="btn btn-white shadow-sm border-0 py-2 px-3" style="border-radius: 12px;">
                        <i class="bi bi-download me-2 text-primary"></i>Export
                    </button>

                </div>
            </div>
        </div>

        <div class="dcard">
            <div id="step2">
                <div class="header-box">
                    <div class="row g-4">
                        <div class="col-md-2">
                            <label class="form-label small fw-bold text-muted">GRN Number</label>
                            <input type="text" class="form-control fw-bold border-0 bg-light" value="GRN/26/0045"
                                readonly>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label small fw-bold text-muted">PO Number (Optional)</label>
                            <input type="text" class="form-control fw-bold border-0 bg-light" value="6546546546"
                                readonly>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label small fw-bold text-muted">Vendor</label>
                           <input type="text" class="form-control fw-bold border-0 bg-light" value="Spark Tech"
                                readonly>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label small fw-bold text-muted">Inward Date</label>
                            <input type="date" class="form-control" value="2026-04-08" disabled>
                        </div>
                    </div>
                </div>

                <div class="line-item-container mt-3">
                    <div class="row g-0">

                        <div class="col-md-3 id-sidebar">
                            <h6 class="section-header"><i class="bi bi-search"></i> Identification</h6>

                            <div class="mb-4">
                                <label class="form-label extra-small fw-bold">ITEM CODE</label>
                                <div class="input-group mb-2">
                                    <input type="text" class="form-control fw-bold border-primary" value="MAT-8802">
                                    <button class="btn btn-primary" title="Change/Assign Code"><i
                                            class="bi bi-pencil-square"></i></button>
                                </div>
                                <span class="extra-small text-muted lh-sm d-block">Change if PO inward, Assign if Petty
                                    Cash/Non-PO.</span>
                            </div>

                            <div class="qr-vault p-3 bg-white rounded-4 border">
                                <div class="text-center mb-3">
                                    <i class="bi bi-qr-code fs-1"></i>
                                </div>
                                <button class="qr-action-btn"><i class="bi bi-printer me-2"></i>Print New QR</button>
                                <button class="qr-action-btn"><i class="bi bi-camera me-2"></i>Capture Existing</button>
                                <button class="qr-action-btn border-primary text-primary"><i
                                        class="bi bi-plus-circle me-2"></i>Generate New</button>
                            </div>
                        </div>

                        <div class="col-md-9 p-4">
                            <div class="d-flex justify-content-between align-items-center mb-4">
                                <h5 class="fw-bold m-0 text-dark">Allocation Matrix</h5>
                                <div class="text-end">
                                    <div class="small text-muted">Total Received</div>
                                    <div class="fw-bold fs-5">250.00 Units</div>
                                </div>
                            </div>

                            <div class="mb-5">
                                <div class="d-flex justify-content-between align-items-center">
                                    <h6 class="section-header"><i class="bi bi-people-fill"></i> i. User & Department
                                        Allocation</h6>
                                    <button class="btn btn-sm btn-link text-decoration-none fw-bold"><i
                                            class="bi bi-plus-lg me-1"></i> Add Split</button>
                                </div>
                                <table class="table table-split">
                                    <thead>
                                        <tr>
                                            <th>Select User</th>
                                            <th>Department</th>
                                            <th width="120">Qty Split</th>
                                            <th width="50"></th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <tr>
                                            <td>
                                                <select class="form-select form-select-sm">
                                                    <option>Rahul Bajaj (Emp-101)</option>
                                                    <option>Anika Singh (Emp-105)</option>
                                                </select>
                                            </td>
                                            <td><input type="text" class="form-control form-control-sm bg-light"
                                                    value="Manufacturing" readonly></td>
                                            <td><input type="number"
                                                    class="form-control form-control-sm qty-split-input" value="150">
                                            </td>
                                            <td class="text-end"><i class="bi bi-trash3 text-danger cursor-pointer"></i>
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>

                            <div>
                                <div class="d-flex justify-content-between align-items-center">
                                    <h6 class="section-header"><i class="bi bi-layers-half"></i> ii. Batch Details
                                        Allocation</h6>
                                    <button class="btn btn-sm btn-link text-decoration-none fw-bold"><i
                                            class="bi bi-plus-lg me-1"></i> New Batch</button>
                                </div>
                                <table class="table table-split">
                                    <thead>
                                        <tr>
                                            <th>Batch Number</th>
                                            <th>MFG Date</th>
                                            <th>Expiry Date</th>
                                            <th width="120">Qty Split</th>
                                            <th width="50"></th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <tr>
                                            <td><input type="text" class="form-control form-control-sm"
                                                    value="BATCH-APR-001"></td>
                                            <td><input type="date" class="form-control form-control-sm"></td>
                                            <td><input type="date" class="form-control form-control-sm"></td>
                                            <td><input type="number"
                                                    class="form-control form-control-sm qty-split-input" value="150">
                                            </td>
                                            <td class="text-end"><i class="bi bi-trash3 text-danger cursor-pointer"></i>
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>

                    </div>
                </div>

            
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../sidebar.js"></script>
    <script src="../header.js"></script>

</body>


</html>
