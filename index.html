<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eConnect | Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
       <link rel="stylesheet" href="common.css">
    <link rel="stylesheet" href="styles.css">

</head>

<body>

    <div id="sidebar-placeholder"></div>
    <div id="header-placeholder"></div>
    <main id="main-wrapper">
        <div class="welcome-card">
            <div class="row align-items-center">
                <div class="col-md-8">
                    <span class="badge bg-primary-subtle text-primary px-3 py-2 rounded-pill mb-3">System Online</span>
                    <h2>Welcome back, Stores!</h2>
                    <p class="text-muted mb-0">Your inventory management dashboard is ready. You have <b
                            class="text-danger">5</b> pending issuance requests to review.</p>
                </div>
                <div class="col-md-4 text-end d-none d-md-block">
                    <i class="bi bi-cloud-check text-primary" style="font-size: 80px; opacity: 0.1;"></i>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="sidebar.js"></script>
    <script src="header.js"></script>
</body>

</html>
